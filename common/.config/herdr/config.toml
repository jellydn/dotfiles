# Herdr configuration
# ~/.config/herdr/config.toml

[theme]
# Kanagawa — matching your tmux setup
name = "kanagawa"

[keys]
# Match your tmux prefix for consistency
prefix = "ctrl+a"

# Toggle sidebar (agents, workspaces, tabs)
toggle_sidebar = "prefix+b"

[terminal]
# CWD follows the source pane/workspace
new_cwd = "follow"

[update]
channel = "stable"
